name: Sync NCAA Stats

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "incremental"
        type: choice
        options: [incremental, full]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Install Chromium (chromote)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser || sudo apt-get install -y --no-install-recommends chromium
          for c in /usr/bin/chromium-browser /usr/bin/chromium /snap/bin/chromium; do
            if [ -x "$c" ]; then echo "CHROMOTE_CHROME=$c" >> "$GITHUB_ENV"; break; fi
          done

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Run sync
        run: |
          cp inst/config/example.yml config.yml
          Rscript scripts/sync_ncaa_stats.R --config config.yml --mode "${{ github.event.inputs.mode || 'incremental' }}"

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet output/college-stats; then
            echo "No stat changes"
          else
            git add output/college-stats
            git commit -m "chore: sync NCAA stats $(date -u +%Y-%m-%d)"
            git push
          fi
