name: test-package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("remotes","devtools","testthat","knitr"), repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_local(".", dependencies=TRUE, upgrade="always")'

      - name: Doctor
        run: Rscript scripts/ncaa_stats_doctor.R

      - name: Run tests
        run: Rscript -e 'devtools::test()'

      - name: Package check (no vignettes/manual)
        run: Rscript -e 'devtools::check(document = FALSE, vignettes = FALSE, manual = FALSE, build_args = c("--no-build-vignettes"), args = c("--no-manual"), error_on = "warning")'
