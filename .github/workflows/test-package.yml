name: test-package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, local::.
          needs: check

      - name: Doctor
        run: Rscript scripts/ncaa_stats_doctor.R

      - name: Run tests
        run: Rscript -e 'devtools::test()'

      - name: Package check (no vignettes/manual)
        run: Rscript -e 'devtools::check(document = FALSE, vignettes = FALSE, manual = FALSE, build_args = c("--no-build-vignettes"), args = c("--no-manual"), error_on = "warning")'
